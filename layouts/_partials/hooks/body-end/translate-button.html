{{/* Inject a "日本語" button into the navbar that redirects the current page
     through the Google Translate proxy (English -> Japanese). */}}
<script>
(function () {
  function buildTranslateUrl(href) {
    var u;
    try { u = new URL(href); } catch (e) { return null; }
    // Google Translate proxy expects host with dots->hyphens and hyphens->double-hyphens.
    var host = u.host.replace(/-/g, '--').replace(/\./g, '-');
    var path = u.pathname + (u.search || '');
    var sep = u.search ? '&' : '?';
    return u.protocol + '//' + host + '.translate.goog' + path + sep + '_x_tr_sl=en&_x_tr_tl=ja&_x_tr_hl=ja';
  }

  function findNavbarRight() {
    // The right-side cluster of the HugoBlox navbar contains the theme-toggle.
    var toggle = document.querySelector('.navbar .theme-toggle');
    if (toggle) {
      var box = toggle.closest('div');
      if (box && box.parentElement) return box.parentElement;
    }
    // Fallback: look for the cluster div with `ml-auto`.
    return document.querySelector('.navbar .ml-auto');
  }

  function insertButton() {
    if (document.querySelector('[data-translate-jp]')) return;
    var target = findNavbarRight();
    if (!target) return;

    var wrapper = document.createElement('div');
    wrapper.setAttribute('data-translate-jp', '');
    wrapper.className = 'px-3 text-[var(--hb-color-header-fg)] hover:text-primary-500';

    var a = document.createElement('a');
    a.href = '#';
    a.className = 'text-sm font-medium cursor-pointer';
    a.title = 'View this page in Japanese (Google Translate)';
    a.textContent = '日本語';
    a.addEventListener('click', function (e) {
      e.preventDefault();
      var url = buildTranslateUrl(window.location.href);
      if (url) window.location.href = url;
    });

    wrapper.appendChild(a);
    // Place it as the first item in the right cluster (left of theme toggle).
    target.insertBefore(wrapper, target.firstChild);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', insertButton);
  } else {
    insertButton();
  }
})();
</script>
