<script async defer src="https://buttons.github.io/buttons.js"></script>
<script>
  (() => {
    const siteOrigin = 'https://jkoba0512.github.io'
    const sitePath = '/jkoba-lab/'

    const isSiteLink = (link) => {
      const href = link.getAttribute('href')
      if (!href || href.startsWith('#')) return false
      try {
        const url = new URL(href, window.location.origin)
        return url.origin === window.location.origin || (url.origin === siteOrigin && url.pathname.startsWith(sitePath))
      } catch {
        return false
      }
    }

    const normalizeLink = (link) => {
      if (!isSiteLink(link)) return
      link.removeAttribute('target')
      link.removeAttribute('rel')
    }

    const fixPublicationsLink = (link) => {
      if (link.closest('#nav-menu') && link.textContent.trim() === 'Publications') {
        link.setAttribute('href', '/jkoba-lab/publications/')
      }
    }

    const normalizeLinks = () => {
      document.querySelectorAll('a').forEach((link) => {
        fixPublicationsLink(link)
        normalizeLink(link)
      })
    }

    const fixJapaneseNavPublications = () => {
      document.querySelectorAll('#nav-menu a').forEach((link) => {
        fixPublicationsLink(link)
      })
    }

    document.addEventListener('DOMContentLoaded', () => {
      fixJapaneseNavPublications()
      normalizeLinks()
    })

    document.addEventListener(
      'click',
      (event) => {
        const link = event.target.closest('a')
        if (!link) return
        fixPublicationsLink(link)
        if (!isSiteLink(link)) return
        normalizeLink(link)
        event.preventDefault()
        window.location.href = link.href
      },
      true
    )
  })()
</script>
<style>
  @media (min-width: 1024px) {
    .navbar-brand,
    #nav-menu {
      flex-shrink: 1;
      min-width: 0;
    }

    #nav-menu > :not([hidden]) ~ :not([hidden]) {
      margin-left: 0.75rem !important;
    }

    #nav-menu .nav-link {
      white-space: nowrap;
    }

    [data-hb-language-chooser] {
      min-width: 2.25rem;
      white-space: nowrap;
    }
  }

  @media (min-width: 1024px) and (max-width: 1279px) {
    #nav-menu > :not([hidden]) ~ :not([hidden]) {
      margin-left: 0.5rem !important;
    }

    #nav-menu .nav-link {
      font-size: 0.9rem;
    }

    [data-hb-language-chooser] span {
      display: none;
    }
  }
</style>
