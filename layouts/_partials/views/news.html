{{ $item := .item }}

<article class="w-full border-b border-zinc-200 pb-5 last:border-b-0 last:pb-0 dark:border-zinc-700">
  <div class="flex flex-wrap items-center gap-2 text-sm text-zinc-500 dark:text-zinc-400">
    <time datetime="{{ $item.Date.Format "2006-01-02" }}">{{ $item.Date.Format "Jan 2, 2006" }}</time>
    {{ with $item.Params.tags }}
      {{ range first 2 . }}
        <span class="inline-flex items-center rounded border border-zinc-300 px-2 py-0.5 text-xs font-medium text-zinc-600 dark:border-zinc-600 dark:text-zinc-300">{{ . }}</span>
      {{ end }}
    {{ end }}
  </div>

  <h3 class="mt-2 text-lg font-semibold leading-snug text-zinc-900 dark:text-zinc-100">
    <a class="hover:text-primary-600 dark:hover:text-primary-400" href="{{ $item.RelPermalink }}">{{ $item.Title }}</a>
  </h3>

  {{ with $item.Params.summary | default $item.Summary }}
    <p class="mt-2 text-sm leading-6 text-zinc-600 dark:text-zinc-400">{{ . | plainify }}</p>
  {{ end }}
</article>
